blueprint:
  name: Absolute Humidity Management
  description: Turn a fan on and off based on the difference between an absolute humidity sensor and a reference sensor (in g/m³), toggle an input_boolean
  domain: automation
  input:
    humidity_sensor:
        name: Humidity Sensor
        description: A sensor that measures the absolute humidity of the area (in g/m³)
        selector:
          entity:
            domain: sensor
    reference_humidity:
        name: Reference Humidity
        description: A value in g/m³ that indicates the baseline absolute humidity if there is no reference sensor available
        default: 8.0
    reference_humidity_sensor:
        name: Reference Humidity Sensor
        description: A sensor that indicates the baseline absolute humidity of the location (in g/m³)
        selector:
          entity:
            domain: sensor
        default: []
    fan_switch:
        name: Fan Switch
        description: A switch that turns the fan on and off
        selector:
          entity:
            domain: switch
    rising_threshold:
        name: Rising Threshold
        description: How many g/m³ above the reference absolute humidity the sensor can rise before the fan is turned on
        selector:
          number:
            min: 0.0
            max: 20.0
            step: 0.1
            mode: slider
        default: 2.0
    falling_threshold:
        name: Falling Threshold
        description: How many g/m³ above the reference absolute humidity the sensor must fall to before the fan is turned off
        selector:
          number:
            min: 0.0
            max: 20.0
            step: 0.1
            mode: slider
        default: 1.0
    humidity_automation_boolean:
        name: Input Boolean Toggle
        description: Input Boolean that tracks whether the fan was turned on by this automation. Prevents the automation from turning off a fan that was manually turned on.
        selector:
          entity:
            domain: input_boolean
  source_url: https://community.home-assistant.io/t/turn-a-fan-on-and-off-based-on-the-difference-between-a-humidity-sensor-and-a-baseline/255999/41
# --- How this automation works ---
#
# Internal variables (computed automatically, not user-configurable):
#   switch_state = current state of the fan switch ("on" or "off")
#   difference   = humidity_sensor - reference_humidity_sensor (in g/m³)
#   mode         = the DESIRED fan state, based on the humidity difference:
#                  - fan is off and difference > rising_threshold  → mode = "on"  (turn fan on)
#                  - fan is on  and difference > falling_threshold → mode = "on"  (keep fan on)
#                  - otherwise                                     → mode = "off" (turn fan off)
#                  The two separate thresholds create hysteresis to prevent rapid toggling.
#
# Trigger:
#   Fires whenever either humidity sensor reports a new value.
#
# Conditions (both must be true for the action to run):
#   1. mode != switch_state  — only act if the desired state differs from the current state
#   2. OR:
#      a. mode == "on"       — always allowed to turn the fan ON
#      b. boolean is "on"    — only allowed to turn the fan OFF if the automation was
#                               the one that turned it on (the boolean tracks this)
#
# Action:
#   Sets the fan switch and the boolean to the same state (on or off).
#
# The input_boolean (humidity_automation_boolean):
#   This is an internal helper — leave it OFF initially and never toggle it manually.
#   The automation manages it automatically to track whether it was responsible for
#   turning on the fan. This enables the manual override behavior described below.
#
# Manual override scenario:
#   - Automation turns fan ON  → boolean = on (marks "automation did this")
#   - Automation turns fan OFF → checks boolean is on first, then sets both to off
#   - User manually turns fan ON → boolean stays off (automation didn't set it)
#     → when humidity drops, automation wants mode = "off", but boolean is off
#     → condition 2 fails → action is blocked → fan stays on until user turns it off
#
trigger:
  - entity_id: !input humidity_sensor
    platform: state
  - entity_id: !input reference_humidity_sensor
    platform: state
condition:
  condition: and
  conditions:
    - condition: template
      value_template: '{{ mode != switch_state }}'
    - condition: or
      conditions:
        - condition: template
          value_template: '{{ mode == ''on'' }}'
        - condition: state
          entity_id: !input humidity_automation_boolean
          state: "on"
action:
  - service: switch.turn_{{mode}}
    entity_id: !input fan_switch
  - service: input_boolean.turn_{{mode}}
    entity_id: !input humidity_automation_boolean
variables:
    reference_humidity: !input reference_humidity
    humidity_sensor: !input humidity_sensor
    reference_humidity_sensor: !input reference_humidity_sensor
    fan_switch: !input fan_switch
    switch_state: '{{ states(fan_switch) }}'
    rising_threshold: !input rising_threshold
    falling_threshold: !input falling_threshold
    difference: '{{ states(humidity_sensor)|float - (states(reference_humidity_sensor)|float or reference_humidity|float) }}'
    mode: '{% if switch_state == ''off'' and difference|float > rising_threshold|float %}on{% elif switch_state == ''on'' and difference|float > falling_threshold|float %}on{% else %}off{% endif %}'
mode: single
